<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
    <!-- Background Circle -->
    <circle cx="600" cy="300" r="250" fill="#4CAF50" opacity="0.8"/>
    
    <!-- Desktop/Laptop Mockup -->
    <g transform="translate(100, 150)">
        <!-- Device Frame -->
        <rect x="0" y="0" width="400" height="250" rx="10" fill="#ffffff" stroke="#333333" stroke-width="2"/>
        
        <!-- Login Interface -->
        <g transform="translate(20, 20)">
            <!-- Logo -->
            <text x="10" y="30" font-family="Arial" font-size="24" fill="#4CAF50">SmartFarm</text>
            
            <!-- Login Form -->
            <text x="10" y="70" font-family="Arial" font-size="14" fill="#666666">Welcome to SmartFarm!</text>
            <rect x="10" y="90" width="200" height="30" rx="5" fill="#f5f5f5"/>
            <text x="20" y="110" font-family="Arial" font-size="12" fill="#999999">Email or username</text>
            
            <rect x="10" y="130" width="200" height="30" rx="5" fill="#f5f5f5"/>
            <text x="20" y="150" font-family="Arial" font-size="12" fill="#999999">Password</text>
            
            <rect x="10" y="170" width="200" height="35" rx="5" fill="#4CAF50"/>
            <text x="85" y="192" font-family="Arial" font-size="14" fill="#ffffff">Login</text>
        </g>
    </g>
    
    <!-- Mobile Device Mockup -->
    <g transform="translate(450, 100)">
        <!-- Device Frame -->
        <rect x="0" y="0" width="250" height="400" rx="20" fill="#ffffff" stroke="#333333" stroke-width="2"/>
        
        <!-- Screen Content -->
        <g transform="translate(20, 40)">
            <!-- Header -->
            <text x="0" y="30" font-family="Arial" font-size="18" fill="#333333">Market Dashboard</text>
            
            <!-- Stats -->
            <text x="0" y="70" font-family="Arial" font-size="14" fill="#666666">Active Buyers</text>
            <text x="0" y="90" font-family="Arial" font-size="24" font-weight="bold" fill="#333333">2.5K</text>
            
            <!-- Graph -->
            <path d="M 0 150 L 50 140 L 100 160 L 150 130 L 200 120" fill="none" stroke="#4CAF50" stroke-width="2"/>
            
            <!-- Menu Items -->
            <rect x="0" y="200" width="210" height="40" rx="5" fill="#f5f5f5"/>
            <text x="20" y="225" font-family="Arial" font-size="14" fill="#333333">Market Prices</text>
            
            <rect x="0" y="250" width="210" height="40" rx="5" fill="#f5f5f5"/>
            <text x="20" y="275" font-family="Arial" font-size="14" fill="#333333">Knowledge Hub</text>
        </g>
    </g>
</svg>
